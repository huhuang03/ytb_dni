name: Release Extension

on:
  push:
    tags:
      - 'v*'   # 只有 push v1.0.0 这种 tag 才触发

jobs:
  release:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'yarn'

      # 启用 Corepack，并激活 Yarn 4.x
      - name: Enable Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Chrome Extension
        run: yarn build:chrome

      - name: Build Firefox Extension
        run: yarn build:firefox

      # 创建 Release
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # 打包 Chrome
      - name: Zip Chrome
        run: |
          cd dist
          zip -r chrome-${{ github.ref_name }}.zip chrome
          cd ..

      # 打包 Firefox
      - name: Zip Firefox
        run: |
          cd dist
          zip -r firefox-${{ github.ref_name }}.zip firefox
          cd ..

      # 上传 Chrome zip 到 Release
      - name: Upload Chrome zip
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/chrome-${{ github.ref_name }}.zip
          asset_name: chrome-${{ github.ref_name }}.zip
          asset_content_type: application/zip

      # 上传 Firefox zip 到 Release
      - name: Upload Firefox zip
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/firefox-${{ github.ref_name }}.zip
          asset_name: firefox-${{ github.ref_name }}.zip
          asset_content_type: application/zip
