name: Release Extension

on:
  push:
    tags:
      - 'v*'   # 只有 push v1.0.0 这种 tag 才触发

jobs:
  release:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'yarn'

      # 启用 Corepack 并激活 Yarn 4.x
      - name: Enable Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Chrome Extension
        run: yarn build:chrome

      - name: Build Firefox Extension
        run: yarn build:firefox

      # 打包 Chrome
      - name: Zip Chrome
        run: |
          cd dist
          zip -r chrome-${{ github.ref_name }}.zip chrome
          cd ..

      # 打包 Firefox
      - name: Zip Firefox
        run: |
          cd dist
          zip -r firefox-${{ github.ref_name }}.zip firefox
          cd ..

      # 创建 Release 并上传 Assets
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            dist/chrome-${{ github.ref_name }}.zip
            dist/firefox-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
